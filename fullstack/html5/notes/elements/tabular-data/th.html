<!-- 
The <th> element represents a header cell in a table

Categories:
 - None

Contexts in which this element can be used:
 - As a child of a <tr> element

Content model:
 - Flow content, but with no <header>, <footer>, sectioning content, or heading content descendants

Attributes:
 - global
 - colspan: Number of columns that the cell is to span
 - rowspan: Number of rows that the cell is to span
 - headers: The header cells for this cell
 - scope: Specifies which cells the header cell applies to
 - abbr: Alternative label to use for the header cell when referencing the cell in other contexts

Accessibility considerations: https://w3c.github.io/html-aria/#el-th

Links:
 - https://html.spec.whatwg.org/multipage/sections.html#the-th-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/th
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Measurement</th>
        <th>Average</th>
        <th>Maximum</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td></td>
        <th scope="rowgroup">Cats</th>
        <td></td>
        <td></td>
      </tr>
      <tr>
        <td>93</td>
        <th>Legs</th>
        <td>3.5</td>
        <td>4</td>
      </tr>
      <tr>
        <td>10</td>
        <th>Tails</th>
        <td>1</td>
        <td>1</td>
      </tr>
    </tbody>
    <tbody>
      <tr>
        <td></td>
        <th scope="rowgroup">English speakers</th>
        <td></td>
        <td></td>
      </tr>
      <tr>
        <td>32</td>
        <th>Legs</th>
        <td>2.67</td>
        <td>4</td>
      </tr>
      <tr>
        <td>35</td>
        <th>Tails</th>
        <td>0.33</td>
        <td>1</td>
      </tr>
    </tbody>
  </table>
</html>
