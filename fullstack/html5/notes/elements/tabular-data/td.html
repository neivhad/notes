<!-- 
The <td> element represents a data cell in a table

Categories:
 - None

Contexts in which this element can be used:
 - As a child of a <tr> element

Content model:
 - Flow content

Attributes:
 - global
 - colspan: Number of columns that the cell is to span
 - rowspan: Number of rows that the cell is to span
 - headers: The header cells for this cell

Accessibility considerations: https://w3c.github.io/html-aria/#el-td

Links:
 - https://html.spec.whatwg.org/multipage/sections.html#the-td-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/td
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <table>
    <caption>
      <strong>Characteristics with positive and negative sides.</strong>
      <p>
        Characteristics are given in the second column, with the negative side
        in the left column and the positive side in the right column.
      </p>
    </caption>
    <thead>
      <tr>
        <th id="n">Negative</th>
        <th>Characteristic</th>
        <th>Positive</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td headers="n r1">Sad</td>
        <th id="r1">Mood</th>
        <td>Happy</td>
      </tr>

      <tr>
        <td headers="n r2">Failing</td>
        <th id="r2">Grade</th>
        <td>Passing</td>
      </tr>
    </tbody>
  </table>
</html>
