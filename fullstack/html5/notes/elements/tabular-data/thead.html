<!-- 
The <thead> element represents the block of rows that consist of the column labels (headers) and any ancillary non-header cells for
the parent <table> element, if the <thead> element has a parent and it is a <table>

Categories:
 - None

Contexts in which this element can be used:
 - as a child of a <table> element, after any <caption>, and <colgroup> elements and before any <tbody>, <tfoot>, and <tr> elements,
but only if there are no other <thead> elements that are children of the <table> element

Content model:
 - Zero or more <tr> and script-supporting elements (<script>, <template>)

Attributes:
 - global

Accessibility considerations: https://w3c.github.io/html-aria/#el-thead

Links:
 - https://html.spec.whatwg.org/multipage/sections.html#the-thead-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/thead
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <table>
    <caption>
      <strong>Characteristics with positive and negative sides.</strong>
      <p>
        Characteristics are given in the second column, with the negative side
        in the left column and the positive side in the right column.
      </p>
    </caption>
    <thead>
      <tr>
        <th id="n">Negative</th>
        <th>Characteristic</th>
        <th>Positive</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td headers="n r1">Sad</td>
        <th id="r1">Mood</th>
        <td>Happy</td>
      </tr>

      <tr>
        <td headers="n r2">Failing</td>
        <th id="r2">Grade</th>
        <td>Passing</td>
      </tr>
    </tbody>
  </table>
</html>
