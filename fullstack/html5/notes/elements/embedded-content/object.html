<!-- 
The <object> element can represent an external resource, which, depending on the type of the resource, will either be treated as
an image or as a child navigable

Categories:
 - Flow content
 - Phrasing content
 - Embedded content
 - Listed form-associated element
 - Palpable content

Contexts in which this element can be used:
 - where embedded content is expected

Content model:
 - Transparent

Attributes:
 - global
 - data: Address of the resource
 - type: Type of embedded resource
 - name: Name of content navigable
 - form: Associates the element with a form element
 - width: Horizontal dimension
 - height: Vertical dimension

Accessibility considerations: https://w3c.github.io/html-aria/#el-object

Links:
 - https://html.spec.whatwg.org/multipage/iframe-embed-object.html#the-object-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/object
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <figure>
      <object data="clock.html"></object>
      <figcaption>My HTML Clock</figcaption>
    </figure>
  </body>
</html>
