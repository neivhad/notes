<!-- 
The <embed> element provides an integration point for an external application or interactive content

Categories:
 - Flow content
 - Phrasing content
 - Embedded content
 - Interactive content
 - Palpable content

Contexts in which this element can be used:
 - where embedded content is expected

Content model:
 - Nothing

Attributes:
 - global
 - src — Address of the resource
 - type — Type of embedded resource
 - width — Horizontal dimension
 - height — Vertical dimension
 - Any other attribute that has no namespace (plugin params)

Accessibility considerations: https://w3c.github.io/html-aria/#el-embed

Links:
 - https://html.spec.whatwg.org/multipage/iframe-embed-object.html#the-embed-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/embed
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <iframe
      id="inlineFrameExample"
      title="Inline Frame Example"
      width="300"
      height="200"
      src="https://www.openstreetmap.org/export/embed.html?bbox=-0.004017949104309083%2C51.47612752641776%2C0.00030577182769775396%2C51.478569861898606&amp;layer=mapnik"
    >
    </iframe>
  </body>
</html>
