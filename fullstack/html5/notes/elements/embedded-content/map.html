<!-- 
The <map> element, in conjunction with an <img> element and any <area> element descendants, defines an image map. The element
represents its children

Categories:
 - Flow content
 - Phrasing content
 - Palpable content

Contexts in which this element can be used:
 - where phrasing content is expected

Content model:
 - Transparent

Attributes:
 - global
 - name: Name of image map to reference from the `usemap` attribute

Accessibility considerations: https://w3c.github.io/html-aria/#el-map

Links:
 - https://html.spec.whatwg.org/multipage/embedded-content.html#the-map-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/map
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <img
      src="/images/menu.gif"
      alt="Babies™ navigation menu. Select a department to go to its page."
      usemap="#nav"
    />
    <map name="nav">
      <p>
        <a href="/clothes/">Clothes</a>
        <area alt="Clothes" coords="0,0,100,50" href="/clothes/" /> |
        <a href="/toys/">Toys</a>
        <area alt="Toys" coords="100,0,200,50" href="/toys/" /> |
        <a href="/food/">Food</a>
        <area alt="Food" coords="200,0,300,50" href="/food/" /> |
        <a href="/books/">Books</a>
        <area alt="Books" coords="300,0,400,50" href="/books/" />
      </p>
    </map>
  </body>
</html>
