<!-- 
The <progress> element represents the completion progress of a task. The progress is either indeterminate, indicating that progress is
being made but that it is not clear how much more work remains to be done before the task is complete (e.g. because the task is waiting
for a remote host to respond), or the progress is a number in the range zero to a maximum, giving the fraction of work that has so far
been completed

Categories:
 - Flow content
 - Phrasing content
 - Labelable element
 - Palpable content

Contexts in which this element can be used:
 - where phrasing content is expected

Content model:
 - Phrasing content, but there must be no <progress> element descendants

Attributes:
 - global
 - value: Current value of the element
 - max: Upper bound of range

Accessibility considerations: https://w3c.github.io/html-aria/#el-progress

 - Authors are encouraged to also include the current value and the maximum value inline as text inside the element, so that
the progress is made available to users of legacy user agents

Links:
 - https://html.spec.whatwg.org/multipage/sections.html#the-progress-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/progress
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <section>
      <h2>Task Progress</h2>
      <p>
        Progress: <progress id="p" max="100"><span>0</span>%</progress>
      </p>
    </section>
  </body>
</html>
