<!-- 
The <optgroup> element represents a group of <option> elements with a common label

Categories:
 - select element inner content elements

Contexts in which this element can be used:
 - as a descendant of a <select> elemen

Content model:
 - Zero or one <legend> element followed by zero or more optgroup element inner content elements

Attributes:
 - global
 - disabled: Whether the form control is disabled
 - label: User-visible label

Accessibility considerations: https://w3c.github.io/html-aria/#el-optgroup

Links:
 - https://html.spec.whatwg.org/multipage/sections.html#the-optgroup-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/optgroup
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <form action="courseselector.dll" method="get">
      <p>Which course would you like to watch today?</p>
      <p>
        <label
          >Course:
          <select name="c">
            <optgroup label="8.01 Physics I: Classical Mechanics">
              <option value="8.01.1">Lecture 01: Powers of Ten</option>
              <option value="8.01.2">Lecture 02: 1D Kinematics</option>
              <option value="8.01.3">Lecture 03: Vectors</option>
            </optgroup>
            <optgroup label="8.02 Electricity and Magnetism">
              <option value="8.02.1">
                Lecture 01: What holds our world together?
              </option>
              <option value="8.02.2">Lecture 02: Electric Field</option>
              <option value="8.02.3">Lecture 03: Electric Flux</option>
            </optgroup>
            <optgroup label="8.03 Physics III: Vibrations and Waves">
              <option value="8.03.1">Lecture 01: Periodic Phenomenon</option>
              <option value="8.03.2">Lecture 02: Beats</option>
              <option value="8.03.3">
                Lecture 03: Forced Oscillations with Damping
              </option>
            </optgroup>
          </select>
        </label>
      </p>
      <p><input type="submit" value="▶ Play" /></p>
    </form>
  </body>
</html>
