<!-- 
The <form> element represents a hyperlink that can be manipulated through a collection of form-associated elements, some of which can
represent editable values that can be submitted to a server for processing

Categories:
 - Flow content
 - Palpable content

Contexts in which this element can be used:
 - where flow content is expected

Content model:
 - flow content, but with no <form> element descendants

Attributes:
 - global
 - accept-charset: Character encodings to use for form submission
 - action: URL to use for form submission
 - autocomplete: Default setting for autofill feature for controls in the form
 - enctype: Entry list encoding type to use for form submission
 - method: Variant to use for form submission
 - name: Name of form to use in the document.forms API
 - novalidate: Bypass form control validation for form submission
 - target: Navigable for form submission
 - rel

Accessibility considerations: https://w3c.github.io/html-aria/#el-form

Links:
 - https://html.spec.whatwg.org/multipage/sections.html#the-form-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/form
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <form>
      <p>
        <label>Customer name: <input /></label>
      </p>
      <p>
        <label>Telephone: <input type="tel" /></label>
      </p>
      <p>
        <label>Email address: <input type="email" /></label>
      </p>
      <fieldset>
        <legend>Pizza Size</legend>
        <p>
          <label> <input type="radio" name="size" /> Small </label>
        </p>
        <p>
          <label> <input type="radio" name="size" /> Medium </label>
        </p>
        <p>
          <label> <input type="radio" name="size" /> Large </label>
        </p>
      </fieldset>
      <fieldset>
        <legend>Pizza Toppings</legend>
        <p>
          <label> <input type="checkbox" /> Bacon </label>
        </p>
        <p>
          <label> <input type="checkbox" /> Extra Cheese </label>
        </p>
        <p>
          <label> <input type="checkbox" /> Onion </label>
        </p>
        <p>
          <label> <input type="checkbox" /> Mushroom </label>
        </p>
      </fieldset>
      <p>
        <label
          >Preferred delivery time:
          <input type="time" min="11:00" max="21:00" step="900"
        /></label>
      </p>
      <p>
        <label>Delivery instructions: <textarea></textarea></label>
      </p>
      <p><button>Submit order</button></p>
    </form>
  </body>
</html>
