<!-- 
The <article> element represents a complete, or self-contained, composition in a document, page,
application, or site and that is, independently distributable or reusable, e.g. in syndication

Categories:
 - Flow content
 - Sectioning content
 - Palpable content

Contexts in which this element can be used:
 - where sectioning content is expected

Content model:
 - Flow content

Attributes:
 - global

Accessibility considerations: https://w3c.github.io/html-aria/#el-article

 - This could be a forum post, a magazine or newspaper article, a blog entry, a user-submitted comment,
 an interactive widget or gadget, or any other independent item of content
 - When <article> elements are nested, the inner <article> elements represent articles that are
 related to the contents of the outer article. For instance, a blog entry on a site that
 accepts user-submitted comments could represent the comments as article elements nested within
 the article element for the blog entry
 - Author information associated with an article element (q.v. the <address> element) does not apply to nested article elements
 - The schema.org microdata vocabulary can be used to provide the publication date for an article element,
 using one of the CreativeWork subtypes

Links:
 - https://html.spec.whatwg.org/multipage/sections.html#the-article-element
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <article itemscope itemtype="http://schema.org/BlogPosting">
      <header>
        <h2 itemprop="headline">The Very First Rule of Life</h2>
        <p>
          <time itemprop="datePublished" datetime="2009-10-09">3 days ago</time>
        </p>
        <link itemprop="url" href="?comments=0" />
      </header>
      <p>
        If there's a microphone anywhere near you, assume it's hot and sending
        whatever you're saying to the world. Seriously.
      </p>
      <p>...</p>
      <footer>
        <a itemprop="discussionUrl" href="?comments=1">Show comments...</a>
      </footer>
    </article>
  </body>
</html>
