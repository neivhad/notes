<!-- 
The <header> element represents a group of introductory or navigational aids

Categories:
 - Flow content
 - Palpable content

Contexts in which this element can be used:
 - where flow content is expected

Content model:
 - flow content, but with no <header> or <footer> element descendants

Attributes:
 - global

Accessibility considerations: https://w3c.github.io/html-aria/#el-header

 - A <header> element is intended to contain a heading (an <h1–h6> element or an <hgroup> element), but this is not required.
 The <header> element can also be used to wrap a section's table of contents, a search form, or any relevant logos
 - The <header> element is not sectioning content; it doesn't introduce a new section

Links:
 - https://html.spec.whatwg.org/multipage/sections.html#the-header-element
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <header>
      <h1>Little Green Guys With Guns</h1>
      <nav>
        <ul>
          <li><a href="/games">Games</a></li>
          <li><a href="/forum">Forum</a></li>
          <li><a href="/download">Download</a></li>
        </ul>
      </nav>
      <h2>Important News</h2>
      <!-- this starts a second subsection -->
      <!-- this is part of the subsection entitled "Important News" -->
      <p>To play today's games you will need to update your client.</p>
      <h2>Games</h2>
      <!-- this starts a third subsection -->
    </header>
    <p>You have three active games:</p>
    <!-- this is still part of the subsection entitled "Games" -->
    ...
  </body>
</html>
