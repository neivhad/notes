<!-- 
The <nav> element represents a section of a page that links to other pages or to parts within the page:
a section with navigation links

Categories:
 - Flow content
 - Sectioning content
 - Palpable content

Contexts in which this element can be used:
 - where sectioning content is expected

Content model:
 - Flow content

Attributes:
 - global

Accessibility considerations: https://w3c.github.io/html-aria/#el-nav

 - Not all groups of links on a page need to be in a <nav> element — the element is primarily intended for sections
 that consist of major navigation blocks. In particular, it is common for footers to have a short list of links to
 various pages of a site, such as the terms of service, the home page, and a copyright page. The <footer> element alone
 is sufficient for such cases; while a <nav> element can be used in such cases, it is usually unnecessary

Links:
 - https://html.spec.whatwg.org/multipage/sections.html#the-nav-element
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/events">Current Events</a></li>
        ...more...
      </ul>
    </nav>
  </body>
</html>
