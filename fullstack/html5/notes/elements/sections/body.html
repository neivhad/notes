<!-- 
The <body> element represents the contents of the document

Categories:
 - None

Contexts in which this element can be used:
 - as the second element in an <html> element

Content model:
 - Flow content

Attributes:
 - global
 - onafterprint
 - onbeforeprint
 - onbeforeunload
 - onhashchange
 - onlanguagechange
 - onmessage
 - onmessageerror
 - onoffline
 - ononline
 - onpageswap
 - onpagehide
 - onpagereveal
 - onpageshow
 - onpopstate
 - onrejectionhandled
 - onstorage
 - onunhandledrejection
 - onunload
The body element exposes as "event handler content attributes" a number of the event handlers of the `Window` object

 - The event handlers of the Window object named by
 the "Window-reflecting body element event handler set"
 (https://html.spec.whatwg.org/multipage/webappapis.html#window-reflecting-body-element-event-handler-set),
 exposed on the <body> element, replace the generic event handlers with the same names normally supported by HTML elements

Accessibility considerations: https://w3c.github.io/html-aria/#el-body

Links:
 - https://html.spec.whatwg.org/multipage/sections.html#the-body-element
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body></body>
</html>
