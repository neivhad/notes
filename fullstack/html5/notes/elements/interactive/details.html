<!-- 
The <details> element represents a disclosure widget from which the user can obtain additional information or controls

Categories:
 - Flow content
 - Interactive content
 - Palpable content

Contexts in which this element can be used:
 - where flow content is expected

Content model:
 - One <summary> element followed by flow content

Attributes:
 - global
 - name: Name of group of mutually-exclusive <details> elements 
 - open: Whether the details are visible 

Accessibility considerations: https://w3c.github.io/html-aria/#el-details

Links:
 - https://html.spec.whatwg.org/multipage/sections.html#the-details-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/details
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <section class="progress window">
      <h1>Copying "Really Achieving Your Childhood Dreams"</h1>
      <details>
        <summary>
          Copying... <progress max="375505392" value="97543282"></progress> 25%
        </summary>
        <dl>
          <dt>Transfer rate:</dt>
          <dd>452KB/s</dd>
          <dt>Local filename:</dt>
          <dd>/home/rpausch/raycd.m4v</dd>
          <dt>Remote filename:</dt>
          <dd>/var/www/lectures/raycd.m4v</dd>
          <dt>Duration:</dt>
          <dd>01:16:27</dd>
          <dt>Color profile:</dt>
          <dd>SD (6-1-6)</dd>
          <dt>Dimensions:</dt>
          <dd>320×240</dd>
        </dl>
      </details>
    </section>
  </body>
</html>
