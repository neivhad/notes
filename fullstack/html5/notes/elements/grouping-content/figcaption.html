<!-- 
The <figcaption> element represents a caption or legend for the rest of the contents of the <figcaption> element's parent
 <figure> element, if any

Categories:
 - None

Contexts in which this element can be used:
 - As the first or last child of a <figure> element

Content model:
 - Flow content

Attributes:
 - global

Accessibility considerations: https://w3c.github.io/html-aria/#el-figcaption

Links:
 - https://html.spec.whatwg.org/multipage/grouping-content.html#the-figcaption-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/figcaption
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <figure>
      <img src="duck.jpeg" alt="duck" />
      <figcaption>
        <p>A duck.</p>
        <p><small>Photograph courtesy of 🌟 News.</small></p>
      </figcaption>
    </figure>
  </body>
</html>
