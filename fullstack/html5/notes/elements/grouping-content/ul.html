<!-- 
The <ul> element represents a list of items, where the order of the items is not important - that is, where changing the order would
not materially change the meaning of the document

Categories:
 - Flow content
 - Palpable content: if the element's children include at least one <li> element

Contexts in which this element can be used:
 - where flow content is expected

Content model:
 - Zero or more <li> and script-supporting elements (<script>, <template>)

Attributes:
 - global

Accessibility considerations: https://w3c.github.io/html-aria/#el-ul

Links:
 - https://html.spec.whatwg.org/multipage/grouping-content.html#the-ul-element
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <p>I have lived in the following countries:</p>
    <ul>
      <li>Norway</li>
      <li>Switzerland</li>
      <li>United Kingdom</li>
      <li>United States</li>
    </ul>
  </body>
</html>
