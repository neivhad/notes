<!-- 
The <dt> element represents the term, or name, part of a term-description group in a description list (<dl> element)

Categories:
 - None

Contexts in which this element can be used:
 - Before <dd> or <dt> elements inside <dl> elements
 - Before <dd> or <dt> elements inside <div> elements that are children of a <dl> element

Content model:
 - Flow content, but with no <header>, <footer>, sectioning content, or heading content descendants

Attributes:
 - global

Accessibility considerations: https://w3c.github.io/html-aria/#el-dt

 - The <dt> element itself, when used in a <dl> element, does not indicate that its contents are a term being defined,
 but this can be indicated using the <dfn> element

Links:
 - https://html.spec.whatwg.org/multipage/grouping-content.html#the-dt-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/dt
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <article>
      <h1>FAQ</h1>
      <dl>
        <dt>What do we want?</dt>
        <dd>Our data.</dd>
        <dt>When do we want it?</dt>
        <dd>Now.</dd>
        <dt>Where is it?</dt>
        <dd>We are not sure.</dd>
      </dl>
    </article>
  </body>
</html>
