<!-- 
The <dd> element represents the description, definition, or value, part of a term-description group in a description list (<dl> element)

Categories:
 - None

Contexts in which this element can be used:
 - After  <dd> or <dt> elements inside <dl> elements
 - After  <dd> or <dt> elements inside <div> elements that are children of a <dl> element

Content model:
 - Flow content

Attributes:
 - global

Accessibility considerations: https://w3c.github.io/html-aria/#el-dd

 - A <dl> can be used to define a vocabulary list, like in a dictionary

Links:
 - https://html.spec.whatwg.org/multipage/grouping-content.html#the-dd-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/dd
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <dl>
      <dt><dfn>happiness</dfn></dt>
      <dd class="pronunciation">/ˈhæpinəs/</dd>
      <dd class="part-of-speech">
        <i><abbr>n.</abbr></i>
      </dd>
      <dd>The state of being happy.</dd>
      <dd>
        Good fortune; success. <q>Oh <b>happiness</b>! It worked!</q>
      </dd>
      <dt><dfn>rejoice</dfn></dt>
      <dd class="pronunciation">/rɪˈdʒɔɪs/</dd>
      <dd>
        <i class="part-of-speech"><abbr>v.intr.</abbr></i> To be delighted
        oneself.
      </dd>
      <dd>
        <i class="part-of-speech"><abbr>v.tr.</abbr></i> To cause one to be
        delighted.
      </dd>
    </dl>
  </body>
</html>
