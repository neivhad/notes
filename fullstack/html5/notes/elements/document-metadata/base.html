<!-- 
The <base> element specifies the document base URL, and the name of the default navigable

Categories:
 - metadata content

Contexts in which this element can be used:
 - in a <head> element containing no other <base> elements

Content model:
 - Nothing

Attributes:
 - global
 - `href`:   document base URL
 - `target`: default navigable for hyperlink navigation and form submission
A <base> element must have either an `href` attribute, a `target` attribute, or both

- A <base> element must come before any other link elements
- If there are multiple <base> elements with `href` or `target` attributes, all but the first are ignored

Accessibility considerations: https://w3c.github.io/html-aria/#el-base

Links:
 - https://html.spec.whatwg.org/multipage/semantics.html#the-base-element
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
    <base href="https://example.com" target="_blank" />
  </head>
  <body></body>
</html>
