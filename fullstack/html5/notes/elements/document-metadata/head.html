<!-- 
The <head> element represents a collection of metadata for the Document

Categories:
 - none

Contexts in which this element can be used:
 - as the first element in an <html> element

Content model:
 - metadata content
 - <title> required (no more than one; can be ommited if the document is an <iframe> srcdoc document
 or if title information is available from a higher-level protocol)
 - no more than one <base> element

Attributes:
 - global

Accessibility considerations: https://w3c.github.io/html-aria/#el-head

Links:
 - https://html.spec.whatwg.org/multipage/semantics.html#the-head-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/head
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body></body>
</html>
