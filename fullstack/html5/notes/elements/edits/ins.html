<!-- 
The <ins> element represents an addition to the document

Categories:
 - Flow content
 - Phrasing content
 - Palpable content

Contexts in which this element can be used:
 - where phrasing content is expected

Content model:
 - Transparent

Attributes:
 - global
 - cite: Link to the source of the quotation or more information about the edit
 - datetime: Date and (optionally) time of the change

Accessibility considerations: https://w3c.github.io/html-aria/#el-ins

Links:
 - https://html.spec.whatwg.org/multipage/text-level-semantics.html#the-ins-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/ins
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <aside>
      <ins>
        <p>I like fruit.</p>
      </ins>
    </aside>
  </body>
</html>
