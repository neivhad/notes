<!-- 
The <u> element represents a span of text with an unarticulated, though explicitly rendered, non-textual annotation, such as labeling
the text as being a proper name in Chinese text (a Chinese proper name mark), or labeling the text as being misspelt

Categories:
 - Flow content
 - Phrasing content
 - Palpable content

Contexts in which this element can be used:
 - where phrasing content is expected

Content model:
 - Phrasing content

Attributes:
 - global

Accessibility considerations: https://w3c.github.io/html-aria/#el-u

 - The default rendering of the <u> element in visual presentations clashes with the conventional rendering of hyperlinks
(underlining). Authors are encouraged to avoid using the u element where it could be confused for a hyperlink

Links:
 - https://html.spec.whatwg.org/multipage/text-level-semantics.html#the-u-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/u
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <p>The <u>see</u> is full of fish.</p>
  </body>
</html>
