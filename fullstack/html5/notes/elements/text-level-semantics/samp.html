<!-- 
The <samp> element represents sample or quoted output from another program or computing system

Categories:
 - Flow content
 - Phrasing content
 - Palpable content

Contexts in which this element can be used:
 - where phrasing content is expected

Content model:
 - Phrasing content

Attributes:
 - global

Accessibility considerations: https://w3c.github.io/html-aria/#el-samp

Links:
 - https://html.spec.whatwg.org/multipage/text-level-semantics.html#the-samp-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/samp
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <p>
      The computer said <samp>Too much cheese in tray two</samp> but I didn't
      know what that meant.
    </p>
  </body>
</html>
