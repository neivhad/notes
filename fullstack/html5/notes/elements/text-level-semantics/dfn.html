<!-- 
The <dfn> element represents the defining instance of a term. The paragraph, description list group, or section that is the nearest
ancestor of the <dfn> element must also contain the definition(s) for the term given by the <dfn> element

Categories:
 - Flow content
 - Phrasing content
 - Palpable content

Contexts in which this element can be used:
 - where phrasing content is expected

Content model:
 - Phrasing content, but there must be no dfn element descendants

Attributes:
 - global
The `title` attribute has special semantics on this element: Full term or expansion of abbreviation
If the `title` attribute of the <dfn> element is present, then it must contain only the term being defined

Accessibility considerations: https://w3c.github.io/html-aria/#el-dfn

 - Defining term: if the <dfn> element has a `title` attribute, then the exact value of that attribute is the term being defined.
 Otherwise, if it contains exactly one element child node and no child Text nodes, and that child element is an <abbr> element with
 a `title` attribute, then the exact value of that attribute is the term being defined. Otherwise, it is the descendant text content
 of the <dfn> element that gives the term being defined
 - An <a> element that links to a <dfn> element represents an instance of the term defined by the <dfn> element

Links:
 - https://html.spec.whatwg.org/multipage/text-level-semantics.html#the-dfn-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/dfn
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <p>
      The <dfn id="gdo"><abbr title="Garage Door Opener">GDO</abbr></dfn> is a
      device that allows off-world teams to open the iris.
    </p>
    <!-- ... later in the document: -->
    <p>
      Teal'c activated his
      <a href="#gdo"><abbr title="Garage Door Opener">GDO</abbr></a> and so
      Hammond ordered the iris to be opened.
    </p>
  </body>
</html>
