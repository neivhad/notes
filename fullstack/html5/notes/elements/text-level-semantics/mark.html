<!-- 
The <mark> element represents a run of text in one document marked or highlighted for reference purposes, due to its relevance in
another context. When used in a quotation or other block of text referred to from the prose, it indicates a highlight that was not
originally present but which has been added to bring the reader's attention to a part of the text that might not have been considered
important by the original author when the block was originally written, but which is now under previously unexpected scrutiny.
When used in the main prose of a document, it indicates a part of the document that has been highlighted due to its likely relevance
to the user's current activity

Categories:
 - Flow content
 - Phrasing content
 - Palpable content

Contexts in which this element can be used:
 - where phrasing content is expected

Content model:
 - Phrasing content

Attributes:
 - global

Accessibility considerations: https://w3c.github.io/html-aria/#el-mark

Links:
 - https://html.spec.whatwg.org/multipage/text-level-semantics.html#the-mark-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/mark
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <p lang="en-US">Consider the following quote:</p>
    <blockquote lang="en-GB">
      <p>
        Look around and you will find, no-one's really
        <mark>colour</mark> blind.
      </p>
    </blockquote>
    <p lang="en-US">
      As we can tell from the <em>spelling</em> of the word, the person writing
      this quote is clearly not American.
    </p>
  </body>
</html>
