<!-- 
The <var> element represents a variable. This could be an actual variable in a mathematical expression or programming context, an
identifier representing a constant, a symbol identifying a physical quantity, a function parameter, or just be a term used as
a placeholder in prose

Categories:
 - Flow content
 - Phrasing content
 - Palpable content

Contexts in which this element can be used:
 - where phrasing content is expected

Content model:
 - Phrasing content

Attributes:
 - global

Accessibility considerations: https://w3c.github.io/html-aria/#el-var

 - For mathematics, in particular for anything beyond the simplest of expressions, MathML is more appropriate. However, the <var>
 element can still be used to refer to specific variables that are then mentioned in MathML expressions

Links:
 - https://html.spec.whatwg.org/multipage/text-level-semantics.html#the-var-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/var
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <p>
      If there are <var>n</var> pipes leading to the ice cream factory then I
      expect at <em>least</em> <var>n</var> flavors of ice cream to be available
      for purchase!
    </p>
  </body>
</html>
