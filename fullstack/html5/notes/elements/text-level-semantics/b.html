<!-- 
The <b> element represents a span of text to which attention is being drawn for utilitarian purposes without conveying any extra
importance and with no implication of an alternate voice or mood, such as key words in a document abstract, product names in a review,
actionable words in interactive text-driven software, or an article lede

Categories:
 - Flow content
 - Phrasing content
 - Palpable content

Contexts in which this element can be used:
 - where phrasing content is expected

Content model:
 - Phrasing content

Attributes:
 - global

Accessibility considerations: https://w3c.github.io/html-aria/#el-b

 - Authors can use the `class` attribute on the <b> element to identify why the element is being used
 - The <b> element should be used as a last resort when no other element is more appropriate. In particular, headings should use
 the <h1> to <h6> elements, stress emphasis should use the <em> element, importance should be denoted with the <strong> element,
 and text marked or highlighted should use the <mark> element

Links:
 - https://html.spec.whatwg.org/multipage/text-level-semantics.html#the-b-element
 - https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/b
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <p>The <b>frobonitor</b> and <b>barbinator</b> components are fried.</p>
  </body>
</html>
