<!-- 
The style element allows authors to embed CSS style sheets in their documents.
The style element is one of several inputs to the styling processing model.
The element does not represent content for the user

Categories:
 - metadata content

Contexts in which this element can be used:
 - where metadata content is expected
 - in a noscript element that is a child of a head element

Content model:
 - text that gives a conformant style sheet

Attributes:
 - global
 - media: Applicable media
 - blocking: Whether the element is potentially render-blocking
The title attribute has special semantics on this element: CSS style sheet set name

Accessibility considerations: https://w3c.github.io/html-aria/

Links:
 - https://html.spec.whatwg.org/multipage/semantics.html#the-style-element
 -->
<!doctype html>
<html lang="en">
  <head>
    <title>My Title</title>
    <meta charset="UTF-8" />
    <style>
      :root {
        font-size: 16px;
      }
    </style>
  </head>
  <body></body>
</html>
