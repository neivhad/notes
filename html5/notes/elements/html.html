<!-- 
The html element represents the root of an HTML document

Categories: 
 - none

Contexts in which this element can be used:
 - as document's `document element`
 - wherever a subdocument fragment is allowed in a compound document

Content model: 
 - a `head` element followed by a `body` element

Attributes:
 - global (`lang` is encouraged)
About using xmlns attribute: https://github.com/whatwg/html/blob/main/FAQ.md#what-is-the-namespace-declaration

Accessibility considerations: https://w3c.github.io/html-aria/#el-html

JS:
 - `window.document`: https://developer.mozilla.org/en-US/docs/Web/API/Window/document

Links:
 - https://html.spec.whatwg.org/multipage/semantics.html#the-html-element
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body></body>
</html>
