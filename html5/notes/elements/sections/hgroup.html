<!-- 
The <hgroup> element represents a heading and related content

Categories:
 - Flow content
 - Heading content
 - Palpable content

Contexts in which this element can be used:
 - where heading content is expected

Content model:
 - Zero or more <p> elements, followed by one <h1>, <h2>, <h3>, <h4>, <h5>, or <h6> element, followed by zero or more <p> elements,
 optionally intermixed with script-supporting elements (<script>, <template>)

Attributes:
 - global

Accessibility considerations: https://w3c.github.io/html-aria/#el-hgroup

 - The element may be used to group an <h1–h6> element with one or more <p> elements containing content representing a subheading,
 alternative title, or tagline

Links:
 - https://html.spec.whatwg.org/multipage/sections.html#the-hgroup-element
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <hgroup>
      <h1>The reality dysfunction</h1>
      <p>Space is not the only void</p>
    </hgroup>
  </body>
</html>
