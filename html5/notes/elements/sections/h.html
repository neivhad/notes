<!-- 
The <h1>, <h2>, <h3>, <h4>, <h5>, and <h6> elements represent headings for their sections

Categories:
 - Flow content
 - Heading content
 - Palpable content

Contexts in which this element can be used:
 - As a child of an <hgroup> element
 - Where heading content is expected

Content model:
 - Phrasing content

Attributes:
 - global

Accessibility considerations: https://w3c.github.io/html-aria/#el-h1-h6

 - While using multiple <h1> elements on one page is allowed by the HTML standard (as long as they are not nested),
 this is not considered a best practice:
 https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/Heading_Elements#avoid_using_multiple_h1_elements_on_one_page
 - 

Links:
 - https://html.spec.whatwg.org/multipage/sections.html#the-h1,-h2,-h3,-h4,-h5,-and-h6-elements
 - https://html.spec.whatwg.org/multipage/sections.html#headings-and-outlines
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Title</title>
  </head>
  <body>
    <h1>Let's call it a draw(ing surface)</h1>
    <section>
      <h2>Diving in</h2>
    </section>
    <section>
      <h2>Simple shapes</h2>
    </section>
    <section>
      <h2>Canvas coordinates</h2>
      <section>
        <h3>Canvas coordinates diagram</h3>
      </section>
    </section>
    <section>
      <h2>Paths</h2>
    </section>
  </body>
</html>
